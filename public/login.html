<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/public/js/sessao.js"></script>
    <link rel="icon" href="./assets/icon/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/public/css/style.css">
    <title>Login</title>

</head>

<body>
    <section id="tela_login">
        <div id="container_login">
            <h1>Bem-vindo ao Sistema de Login</h1>
            <form id="login_form">
                <label for="username">Usuário:</label>
                <input type="text" id="username" name="username">

                <label for="password">Senha:</label>
                <input type="password" id="password" name="password">

                <span id="error_login"></span>

                <button type="submit" onclick="validarLogin()">Entrar</button>
            </form>
            <div id="botaoCadastro">
                <p>Não tem uma conta?</p>
                <button onclick="window.location.href = '../public/cadastro.html'">Cadastre-se</button>
            </div>
            <div id="botaoVoltar"><button onclick="window.location.href = '../public/landing_page.html'; ">‹</button>
            </div>
        </div>
        </div>
    </section>
</body>
<script src="/public/js/script.js"></script>

</html>

<script>


    function entrar() {
        aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
