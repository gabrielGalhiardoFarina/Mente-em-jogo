<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/icon/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./css/formulario.css">
    <script src="./js/validacao.js"></script>
    <script src="./js/sessao.js"></script>
    <title>Login</title>

</head>

<body>
   <section id="tela_login">
    <div id="container_login">
        <div id="botaoVoltar" title="Voltar para a Home">
            <button onclick="window.location.href = './index.html';">‹</button>
        </div>

        <h1>Entrar no <span class="texto_verde">GymSafe</span></h1>
        
        <form id="login_form">
            <label for="email_input">E-mail:</label>
            <input type="email" id="email_input" name="email_input" placeholder="seu@email.com">

            <label for="senha_input">Senha:</label>
            <input type="password" id="senha_input" name="senha_input" placeholder="••••••••">

            <span id="error_login"></span>

            <button id="button_logar" type="button" onclick="validarLogin()">Entrar</button>
        </form>
        
        <div id="botaoCadastro">
            <p>Não tem uma conta? <button class="link-verde" onclick="window.location.href = './cadastro.html'">Cadastre-se</button></p>
        </div>
    </div>
</section>
</body>

</html>
