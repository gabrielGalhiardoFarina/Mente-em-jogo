    <title>Jogo</title>
</head>

<body>
    <header>
        <div id="container_info">
            <div id="dias_passados">
                <img src="./assets/imgs/calendario.svg" alt="" class="icons">
                Dia <span id="dia_atual_html">1</span>
            </div>
            <div id="level">
                <img src="./assets/imgs/estrela.svg" alt="" class="icons">
                Level <span id="level_atual_html">1</span>
            </div>
        </div>
        <div id="container_status">
            <div class="bloco_status">
                <div>
                    <div>
                        <img src="./assets/imgs/vida.svg" alt="" class="icons">
                        Vida
                    </div>
                    <p id="vida"><span id="vida_atual_html">100</span>/<span id="vida_max_html">100</span></p>
                </div>
                <div id="barra_vida" class="barra_status">
                    <div id="barra_vida_preenchimento" class="preenchimento_status"></div>
                </div>
            </div>

            <div class="bloco_status">
                <div>
                    <div>
                        <img src="./assets/imgs/foco.svg" alt="" class="icons">
                        Foco
                    </div>
                    <p id="foco"><span id="foco_atual_html">30</span>/<span id="foco_max_html">100</span></p>
                </div>
                <div id="barra_foco" class="barra_status">
                    <div id="barra_foco_preenchimento" class="preenchimento_status"></div>
                </div>
            </div>

            <div class="bloco_status">
                <div>
                    <div>
                        <img src="./assets/imgs/raio.svg" alt="" class="icons">
                        Energia
                    </div>
                    <p id="energia"><span id="energia_atual_html">30</span>/<span id="energia_max_html">100</span></p>
                </div>
                <div id="barra_energia" class="barra_status">
                    <div id="barra_energia_preenchimento" class="preenchimento_status"></div>
                </div>
            </div>
        </div>

    </header>
    <main>
        <section id="container_player">
            <div id="titulo_personagem">
                <h2 id="titulo_h2">Sobrepeso</h2>
                <p id="descricao_p">Você está se sentindo sobrecarregado, cansado e sem energia para enfrentar os desafios do dia a dia</p>
                <div id="container_progresso">
                    <label for="progresso">Evolução:</label>
                    <p><span id="xp_atual_html">0</span>%</p>
                </div>
                <div id="progresso">
                    <div id="barra_progresso"></div>
                </div>
            </div>
            <div id="personagem">
                <img src="./assets/imgs/personagem/char_1.png" alt="" id="personagem_foto">
            </div>
        </section>
        <section id="container_opcoes">
            <h1>Como você quer gastar o dia?</h1>

            <div id="container_total_opcoes">
            </div>
        </section>
    </main>
    <div id="modal_game_over">
        <div id="container_game_over">
            <h1>Fim de Jogo</h1>
            <p id="game_over_motivo">Você teve pessimos habitos!</p>
            <button onclick="location.reload()">Jogar Novamente</button>
        </div>
    </div>

    <div id="modal_vitoria">
        <div id="container_vitoria">
            <h1>Parabéns!</h1>
            <p id="vitoria_motivo">Você atingiu o nível máximo!</p>
            <button onclick="location.reload()">Jogar Novamente</button>
        </div>
    </div>
    
</body>

    ];

    function cartas_iniciais() {
        clearInterval(cartaAnimacaoOn);
        animacaoBotaoOn = false;
        let cartasAleatorias = [
            jsonCartas[Math.floor(Math.random() * jsonCartas.length)],
            jsonCartas[Math.floor(Math.random() * jsonCartas.length)],
            jsonCartas[Math.floor(Math.random() * jsonCartas.length)]
        ];

        for (let i = 0; i < cartasAleatorias.length; i++) {
            if (cardLista.length >= 3) {
                cardLista.shift();
            }

            let carta = cartasAleatorias[i];

            if (carta.status == "boa") {
                carta_boa(carta.imagem, carta.titulo, carta.descricao, carta.beneficioVida, carta.beneficioEnergia, carta.beneficioFoco, carta.beneficioXp, carta.ListaCustoValor, carta.ListaCustoTexto);
            } else {
                carta_ruim(carta.imagem, carta.titulo, carta.descricao, carta.beneficioVida, carta.beneficioEnergia, carta.beneficioFoco, carta.beneficioXp, carta.ListaCustoValor, carta.ListaCustoTexto);
            }
        }

        container_total_opcoes.innerHTML = cardLista.join("");
    }

    function carta_boa(imagem, titulo, descricao, beneficioVida, beneficioEnergia, beneficioFoco, beneficioXp, ListaCustoValor, ListaCustoTexto) {

        cardLista.push(`
        <button class="button_opcoes" onclick='selecionar_opcao(
        ${beneficioVida}, ${beneficioEnergia}, ${beneficioFoco}, ${beneficioXp}, ${JSON.stringify(ListaCustoValor)}, ${JSON.stringify(ListaCustoTexto)}, this
        )'>
            <div class="container_opcoes_escolha">
                <div class="icons_opcao">
                    <img src="${imagem}" alt="">
                </div>
                <div class="fundo_opcao">
                    <img src="${imagem}" alt="">
                </div>
                <h3 class="titulo_opcao">${titulo}</h3>
                <p class="descricao_opcao">${descricao}</p>
                <div class="beneficios_opcoes">
                    ${beneficioVida ? `<p class="beneficio_vida">+${beneficioVida} de vida</p>` : ''}
                    ${beneficioEnergia ? `<p class="beneficio_energia">+${beneficioEnergia} de energia</p>` : ''}
                    ${beneficioFoco ? `<p class="beneficio_foco">+${beneficioFoco} de foco</p>` : ''}
                    ${beneficioXp ? `<p class="beneficio_xp">+${beneficioXp} de xp</p>` : ''}
                </div>
                <div class="custo_opcao">
                    <p class="custo">Custo: </p>
                    <p class="div_custo_valor">${formatar_custo(ListaCustoValor, ListaCustoTexto)}</p>
                </div>
            </div>
        </button>
    `);
    }

    function carta_ruim(imagem, titulo, descricao, beneficioVida, beneficioEnergia, beneficioFoco, beneficioXp, ListaCustoValor, ListaCustoTexto) {

        cardLista.push(`
        <button class="button_opcoes" onclick='selecionar_opcao(
        ${beneficioVida}, ${beneficioEnergia}, ${beneficioFoco}, ${beneficioXp}, ${JSON.stringify(ListaCustoValor)}, ${JSON.stringify(ListaCustoTexto)}, this
        )'>
            <div class="container_opcoes_escolha_ruim">
                <div class="icons_opcao_ruim">
                    <img src="${imagem}" alt="">
                    </div>
                    <div class="fundo_opcao">
                        <img src="${imagem}" alt="">
                        </div>
                <h3 class="titulo_opcao">${titulo}</h3>
                <p class="descricao_opcao">${descricao}</p>
                <div class="beneficios_opcoes">
                    ${beneficioVida ? `<p class="beneficio_vida">+${beneficioVida} de vida</p>` : ''}
                    ${beneficioEnergia ? `<p class="beneficio_energia">+${beneficioEnergia} de energia</p>` : ''}
                    ${beneficioFoco ? `<p class="beneficio_foco">+${beneficioFoco} de foco</p>` : ''}
                    ${beneficioXp ? `<p class="beneficio_xp">+${beneficioXp} de xp</p>` : ''}
                </div>
                <div class="custo_opcao">
                    <p class="custo">Custo: </p>
                    <p class="div_custo_valor">${formatar_custo(ListaCustoValor, ListaCustoTexto)}</p>
                </div>
            </div>
        </button>
    `);
    }

    function selecionar_opcao(beneficioVida = 0, beneficioEnergia = 0, beneficioFoco = 0, beneficioXp = 0, ListaCustoValor, ListaCustoTexto, botaoParaAnimar) {
        botaoParaAnimar.style.animation = "OpcaoSelecionado 1s ease";

        if (animacaoBotaoOn == false) {
            animacaoBotaoOn = true;

            vida_Atual += beneficioVida;
            energia_Atual += beneficioEnergia;
            foco_Atual += beneficioFoco;
            xp_Atual += beneficioXp;

            for (let i = 0; i < ListaCustoTexto.length; i++) {
                if (ListaCustoTexto[i] == "vida") {
                    vida_Atual -= ListaCustoValor[i];
                } else if (ListaCustoTexto[i] == "energia") {
                    energia_Atual -= ListaCustoValor[i];
                } else if (ListaCustoTexto[i] == "foco") {
                    foco_Atual -= ListaCustoValor[i];
                }
            }

            if (vida_Atual < 0 || energia_Atual < 0 || foco_Atual < 0) {
                abrir_modal_game_over();
                return;
            }

            if(level_atual == 8){
                abrir_modal_vitoria();
                return;
            }


            dia_atual++;

            if (xp_Atual >= 100) {
                level_atual++;
                xp_Atual -= 100;
            }

            if (vida_Atual > 100) {
                vida_Atual = 100;
            }
            if (energia_Atual > 100) {
                energia_Atual = 100;
            }
            if (foco_Atual > 100) {
                foco_Atual = 100;
            }

            vida_atual_html.innerText = vida_Atual;
            energia_atual_html.innerText = energia_Atual;
            foco_atual_html.innerText = foco_Atual;
            xp_atual_html.innerText = xp_Atual;

            atualizar_status_barras();

            dia_atual_html.innerText = dia_atual;
            level_atual_html.innerText = level_atual;


            atualizar_barra_progresso();

            titulo_h2.innerText = descricao_personagem[level_atual - 1].titulo;
            descricao_p.innerText = descricao_personagem[level_atual - 1].descricao;

            personagem_foto.src = `./assets/imgs/personagem/char_${level_atual}.png`;

            cartaAnimacaoOn = setInterval(cartas_iniciais, 900);

        }

    }

    function formatar_custo(ListaCustoValor = [], ListaCustoTexto = []) {
        let custos = [];

        for (let i = 0; i < ListaCustoValor.length; i++) {
            if (ListaCustoTexto[i]) {
                custos.push(`${ListaCustoValor[i]} ${ListaCustoTexto[i]}`);
            }
        }

        return custos.join(" e ");
    }

    function abrir_modal_game_over() {
        modal_game_over.style.display = "flex";
        clearInterval(cartaAnimacaoOn);
        animacaoBotaoOn = true;
    }

    function abrir_modal_vitoria() {
        modal_vitoria.style.display = "flex";
        clearInterval(cartaAnimacaoOn);
        animacaoBotaoOn = true;
    }

    function converter_para_largura_percentual(valorAtual, valorMaximo) {
        const valorSeguro = Math.max(0, Math.min(valorAtual, valorMaximo));
        return `${(valorSeguro / valorMaximo) * 100}%`;
    }

    function atualizar_barra_progresso() {
        barra_progresso.style.width = converter_para_largura_percentual(xp_Atual, 100);
    }

    function atualizar_status_barras() {
        barra_vida_preenchimento.style.width = converter_para_largura_percentual(vida_Atual, vida_Max);
        barra_foco_preenchimento.style.width = converter_para_largura_percentual(foco_Atual, foco_Max);
        barra_energia_preenchimento.style.width = converter_para_largura_percentual(energia_Atual, energia_Max);
    }

    atualizar_barra_progresso();
    atualizar_status_barras();
    cartas_iniciais();
</script>
