    function sair() {
        if (confirm("Tem certeza que deseja sair do questionário?")) {
            window.location.href = "./landing_page.html";
        }
    }   

    function proximaPergunta() {
        let pergunta = jsonPerguntas[questaoAtual].pergunta;
        let ListaOpcoes = jsonPerguntas[questaoAtual].ListaOpcoes;
        let tema = jsonPerguntas[questaoAtual].tema;
        let pontos = jsonPerguntas[questaoAtual].pontos;

        questaoAtual++;
        questao_atual.innerHTML = questaoAtual;

        if(questaoAtual == jsonPerguntas.length){
            //Aqui vou fazer o futuro fech para conseguir resgatar as informações na tela da dashboard
            alert("pontos do questionario: " + pontosAtividadeFisica + " " + pontosMobilidade + " " + pontosSaudeMental + " " + pontosQualidadeSono + " " + pontosAlimentacao + " " + pontosConexaoFamiliar);
            window.location.href = "./dashboard.html";
            return;
        }


        contaner_pergunta.innerHTML = `
                <h1 id="pergunta">${pergunta}</h1>
                <div id="opcoes_questionario">
                    <button class="opcao" id="opcao1" onclick="selecionarOpcao(${pontos[0]}, '${tema}')">${ListaOpcoes[0]}</button>
                    <button class="opcao" id="opcao2" onclick="selecionarOpcao(${pontos[1]}, '${tema}')">${ListaOpcoes[1]}</button>
                    <button class="opcao" id="opcao3" onclick="selecionarOpcao(${pontos[2]}, '${tema}')">${ListaOpcoes[2]}</button>
                    <button class="opcao" id="opcao4" onclick="selecionarOpcao(${pontos[3]}, '${tema}')">${ListaOpcoes[3]}</button>
                </div>
                `

    }

    function selecionarOpcao(pontos, tema) {
        if (tema === "Atividade Física") {
            pontosAtividadeFisica += pontos;
        } else if (tema === "Mobilidade") {
            pontosMobilidade += pontos;
        } else if (tema === "Saúde Mental") {
            pontosSaudeMental += pontos;
        } else if (tema === "Qualidade do Sono") {
            pontosQualidadeSono += pontos;
        } else if (tema === "Alimentação") {
            pontosAlimentacao += pontos;
        } else if (tema === "Conexão Familiar") {
            pontosConexaoFamiliar += pontos;
        }

        proximaPergunta();

    }

    proximaPergunta();
