<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/icon/icon.svg" type="image/x-icon">
    <link rel="stylesheet" href="./css/questionario.css">
    <script src="./js/sessao.js"></script>
    <title>Questionário</title>
</head>

<body onload="validarSessao()">
    <div id="container_questionario">
        <div id="menu_questionario">
            <ul>
                <li id="sair_questionario">
                    <button onclick="limparSessao()">Sair</button>
                </li>
                <li>
                    <span id="questao_atual">1</span>/18
                </li>
            </ul>
        </div>
        <div id="contaner_pergunta">
        </div>
    </div>
</body>
<script>

    let pontosAtividadeFisica = 0;
    let pontosMobilidade = 0;
    let pontosSaudeMental = 0;
    let pontosQualidadeSono = 0;
    let pontosAlimentacao = 0;
    let pontosConexaoFamiliar = 0;

    let questaoAtual = 0;

    let jsonPerguntas = [];

    function loadPerguntas() {
        fetch("/questionario/listar/perguntas", {
            method: "GET",
            headers: {
                "Content-Type": "application/json"
            }
        }).then(response => response.json())
            .then(data => {
                jsonPerguntas = data;
                proximaPergunta();
            })
            .catch(error => {
                console.error("Erro ao carregar perguntas do questionário:", error);
                contaner_pergunta.innerHTML = "<p>Erro ao carregar perguntas. Tente novamente mais tarde.</p>";
            });
    }

    function proximaPergunta() {


        if (questaoAtual == jsonPerguntas.length) {
            fetch("/questionario/cadastrar/pontos", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    pontosAtividadeFisicaServer: pontosAtividadeFisica,
                    pontosMobilidadeServer: pontosMobilidade,
                    pontosSaudeMentalServer: pontosSaudeMental,
                    pontosQualidadeSonoServer: pontosQualidadeSono,
                    pontosAlimentacaoServer: pontosAlimentacao,
                    pontosConexaoFamiliarServer: pontosConexaoFamiliar,
                    emailServer: sessionStorage.getItem("EMAIL_USUARIO"),
                })
            }).then(resposta => {
                if (resposta.ok) {
                    console.log("Pontos cadastrados com sucesso!");
                    window.location.href = "./dashboard.html";
                } else {
                    console.error("Erro ao cadastrar os pontos.");
                }
            }).catch(erro => {
                console.error("Erro na requisição:", erro);
            });
            return;
        }

        let tema = jsonPerguntas[questaoAtual].tema;
        let pergunta = jsonPerguntas[questaoAtual].pergunta;
        let listaOpcoes = jsonPerguntas[questaoAtual].listaOpcoes;
        let ListaOpcoes = [];
        let pontos = [];

        for (let i = 0; i < listaOpcoes.length; i++) {
            ListaOpcoes.push(listaOpcoes[i].opcao);
            pontos.push(listaOpcoes[i].pontos);
        }

        questaoAtual++;
        questao_atual.innerHTML = questaoAtual;

        contaner_pergunta.innerHTML = `
                <h1 id="pergunta">${pergunta}</h1>
                <div id="opcoes_questionario">
                    <button class="opcao" id="opcao1" onclick="selecionarOpcao(${pontos[0]}, '${tema}')">${ListaOpcoes[0]}</button>
                    <button class="opcao" id="opcao2" onclick="selecionarOpcao(${pontos[1]}, '${tema}')">${ListaOpcoes[1]}</button>
                    <button class="opcao" id="opcao3" onclick="selecionarOpcao(${pontos[2]}, '${tema}')">${ListaOpcoes[2]}</button>
                    <button class="opcao" id="opcao4" onclick="selecionarOpcao(${pontos[3]}, '${tema}')">${ListaOpcoes[3]}</button>
                </div>
                `

    }

    function selecionarOpcao(pontos, tema) {
        if (tema === "Atividade Física") {
            pontosAtividadeFisica += pontos;
        } else if (tema === "Mobilidade") {
            pontosMobilidade += pontos;
        } else if (tema === "Saúde Mental") {
            pontosSaudeMental += pontos;
        } else if (tema === "Qualidade do Sono") {
            pontosQualidadeSono += pontos;
        } else if (tema === "Alimentação") {
            pontosAlimentacao += pontos;
        } else if (tema === "Conexão Familiar") {
            pontosConexaoFamiliar += pontos;
        }

        proximaPergunta();

    }

    loadPerguntas();




</script>

</html>
