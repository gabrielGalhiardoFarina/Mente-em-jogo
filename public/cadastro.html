<html lang="pt-br">

<head>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500&display=swap"

  <title>Cadastro</title>
</head>

<body>
  <section id="tela_login">
    <div id="container_login">
      <div id="botaoVoltar" title="Voltar para a Home">
        <button onclick="window.location.href = './landing_page.html';">‹</button>
      </div>

      <h1>Cadastrar no <span class="texto_verde">GymSafe</span></h1>

      <form id="login_form">
        <label for="nome_input">Nome:</label>
        <input type="text" id="nome_input" name="nome_input" placeholder="Seu nome completo">

        <label for="email_input">E-mail:</label>
        <input type="email" id="email_input" name="email_input" placeholder="seu@email.com">

        <label for="senha_input">Senha:</label>
        <input type="password" id="senha_input" name="senha_input" placeholder="••••••••">

        <label for="confirmacao_senha_input">Confirmar Senha:</label>
        <input type="password" id="confirmacao_senha_input" name="confirmacao_senha_input" placeholder="••••••••">
        <span id="error_cadastro"></span>

        <button type="button" onclick="validarCadastro()" id="button_cadastrar">Cadastrar</button>
      </form>

      <div id="botaoCadastro">
        <p>Ja tem uma conta? <button class="link-verde"
            onclick="window.location.href = './login.html'">Entrar</button></p>
      </div>
    </div>
  </section>
</body>

</html>
