<!DOCTYPE html>
<html lang="en">
    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="shortcut icon" href="/public/assets/icon/icon.svg" type="image/x-icon">
        <link rel="stylesheet" href="/public/css/style.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500&display=swap"rel="stylesheet">
        
    </head>

<body>
    <section id="tela_login">
        <div id="container_login">
            <h1>Bem-vindo ao Sistema de Login</h1>
            <form id="login_form">
                <label for="username">Usuário:</label>
                <input type="text" id="username" name="username" required>

                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" required>

                <button type="submit" onclick="carregarTela()">Entrar</button>
            </form>
        </div>
    </section>

    <section id="tela_carregamento" style="display: none;">
        <div id="container_animacao">
            <div id="cerebro">
                <img src="/public/assets/imgs/logo-CEREBRO.svg" alt="Cerebro">
            </div>
            <div id="controle">
                <img src="/public/assets/imgs/logo-CONTROLE.svg" alt="Controle">
            </div>
        </div>
        <span id="texto_carregamento">Entrando.</span>
        <meter id="carregamento" min="0" max="100" value="0"></meter>
    </section>

    <section id="tela_home" style="display: none;">
        <div id="container_home">
            <h1>Tela Principal</h1>
        </div>
    </section>
</body>

<script src="/public/js/script.js"></script>

</html>
